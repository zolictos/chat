<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Smart Control Panel</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Legacy SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --bg: #0b0f1a;
            --card-bg: rgba(23, 32, 51, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .dashboard-card {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header h2 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header i { color: var(--accent); }

        /* Unified Terminal Display */
        .unified-terminal {
            background: rgba(0, 0, 0, 0.3);
            border: 1px inset rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .entry-content { font-family: 'Courier New', monospace; font-weight: 600; font-size: 15px; }
        .entry-time { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

        /* Types Styling */
        .type-message { border-left: 3px solid var(--accent); color: var(--accent); }
        .type-calculator { border-left: 3px solid var(--success); color: var(--success); }

        .tag {
            font-size: 9px;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
            display: inline-block;
        }
        .tag-msg { background: rgba(59, 130, 246, 0.2); color: var(--accent); }
        .tag-calc { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        /* Input Controls */
        .controls { display: flex; flex-direction: column; gap: 12px; }
        input[type="text"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            font-size: 14px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--card-border); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .footer-credit {
            margin-top: 30px;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.6;
        }
        .footer-credit .line { width: 20px; height: 1px; background: currentColor; }

        .toast {
            position: fixed;
            bottom: 20px;
            background: #1e293b;
            color: #fff;
            padding: 12px 25px;
            border-radius: 10px;
            transform: translateY(100px);
            transition: 0.4s;
            z-index: 1000;
        }
        .toast.show { transform: translateY(0); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard-card">
    <div class="header">
        <h2><i class="fa-solid fa-terminal"></i> System Terminal</h2>
        <div style="font-size: 10px; color: var(--success);"><i class="fa-solid fa-circle"></i> Live Sync</div>
    </div>

    <!-- Unified Display Area -->
    <div class="unified-terminal" id="mainTerminal">
        <!-- Log entries will appear here -->
    </div>

    <div class="controls">
        <input type="text" id="txtInput" placeholder="Type a message for OLED...">
        <div class="action-row">
            <button class="btn btn-primary" onclick="sendData('message', 'txtInput')">
                <i class="fa-solid fa-paper-plane"></i> Send OLED
            </button>
            <button class="btn btn-secondary" onclick="clearTerminal()">
                <i class="fa-solid fa-trash-can"></i> Clear Terminal
            </button>
        </div>
    </div>
</div>

<div class="footer-credit">
    <div class="line"></div>
    <span>MODE BY ZOLIX</span>
    <div class="line"></div>
</div>

<div id="toast" class="toast">Operation Successful</div>

<script>
    // ===== Firebase Setup =====
    const firebaseConfig = {
        databaseURL: "https://esp32-8d283-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const terminal = document.getElementById('mainTerminal');

    // State to avoid duplicate entries on initial load
    let lastMsg = null;
    let lastCalc = null;

    // Listen for OLED Messages
    db.ref('message').on('value', snap => {
        const val = snap.val();
        if (val && val !== lastMsg) {
            addEntry(val, 'message');
            lastMsg = val;
        }
    });

    // Listen for Calculator Results
    db.ref('calculator').on('value', snap => {
        const val = snap.val();
        if (val && val !== lastCalc) {
            addEntry(val, 'calculator');
            lastCalc = val;
        }
    });

    function addEntry(text, type) {
        const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        const entry = document.createElement('div');
        entry.className = `log-entry type-${type}`;
        
        const tagLabel = type === 'message' ? 'OLED' : 'CALC';
        const tagClass = type === 'message' ? 'tag-msg' : 'tag-calc';

        entry.innerHTML = `
            <div>
                <span class="tag ${tagClass}">${tagLabel}</span>
                <div class="entry-content">${text}</div>
            </div>
            <div class="entry-time">${time}</div>
        `;
        
        terminal.prepend(entry);

        // Keep only last 30 entries
        if (terminal.children.length > 30) {
            terminal.removeChild(terminal.lastChild);
        }
    }

    function sendData(path, inputId) {
        const input = document.getElementById(inputId);
        const val = input.value.trim();
        
        if(!val) {
            showToast("Field is empty!");
            return;
        }

        db.ref(path).set(val)
            .then(() => {
                showToast("✅ Sent Successfully");
                input.value = "";
            })
            .catch(() => showToast("❌ Connection Error"));
    }

    function clearTerminal() {
        terminal.innerHTML = "";
        showToast("Terminal Cleaned");
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.getElementById('txtInput').addEventListener('keypress', e => {
        if(e.key === 'Enter') sendData('message', 'txtInput');
    });
</script>

</body>
</html>
